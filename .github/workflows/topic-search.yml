name: 🔍 Topic Search

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Suchbegriff (z.B. "Iran Krieg", "Automobilsport")'
        required: true
        type: string

jobs:
  fetch-topic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_topic.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 fetch_topic.py "${{ github.event.inputs.query }}"

      - name: Commit & push topic.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/topic.json
          git diff --staged --quiet || git commit -m "topic: ${{ github.event.inputs.query }}"
          git push
