name: Update YouTube Data

on:
  schedule:
    - cron: '0 7 * * *'   # täglich 07:00 UTC (= 08:00 MEZ / 09:00 MESZ)
  workflow_dispatch:       # manuell auslösbar

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run fetch_data.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos.json
          git diff --cached --quiet || git commit -m "chore: update videos.json [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
